<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - AccuBooks</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div style="margin-bottom: 30px;">
                <h3 style="color: var(--primary-color); margin-bottom: 10px;">AccuBooks</h3>
                <select id="organisationSelect" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);">
                    <option value="">Select Organisation</option>
                </select>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="gl-accounts.html">📖 GL Accounts</a></li>
                <li><a href="daybook.html">📝 Daybook</a></li>
                <li><a href="reports.html">📈 Reports</a></li>
                <li><a href="customers.html" class="active">👥 Customers</a></li>
                <li><a href="suppliers.html">🏢 Suppliers</a></li>
                <li><a href="organisations.html">🏭 Organisations</a></li>
                <li><hr style="margin: 15px 0;"></li>
                <li><a href="#logout" id="logoutBtn">🚪 Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <h1>Customers</h1>
                <p>Manage your customer accounts</p>
            </div>

            <div style="margin-bottom: 20px;">
                <button id="newCustomerBtn" class="btn btn-primary">+ New Customer</button>
            </div>

            <div id="customerFormContainer" style="display: none; margin-bottom: 30px; background: var(--light-bg); padding: 20px; border-radius: 8px;">
                <h3>New Customer</h3>
                <form id="customerForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Customer Name</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="phone">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" name="address">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" name="city">
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" name="postalCode">
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" name="country">
                        </div>
                        <div class="form-group">
                            <label>Credit Limit</label>
                            <input type="number" name="creditLimit" step="0.01" value="0">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                        <button type="submit" class="btn btn-success">Create Customer</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Credit Limit</th>
                            <th>Balance</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersTable">
                        <tr>
                            <td colspan="7" style="text-align: center; color: var(--secondary-color);">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { ApiService, UIUtils, AuthGuard } from '../js/api.js';

        AuthGuard.init();

        const newCustomerBtn = document.getElementById('newCustomerBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const customerFormContainer = document.getElementById('customerFormContainer');
        const customerForm = document.getElementById('customerForm');
        const customersTable = document.getElementById('customersTable');

        newCustomerBtn.addEventListener('click', () => {
            customerFormContainer.style.display = 'block';
        });

        cancelBtn.addEventListener('click', () => {
            customerFormContainer.style.display = 'none';
            customerForm.reset();
        });

        async function loadCustomers() {
            const orgId = ApiService.getSelectedOrg();
            if (!orgId) return;

            const response = await ApiService.getCustomers(orgId);
            if (response.ok) {
                const customers = response.data;
                if (customers.length === 0) {
                    customersTable.innerHTML = '<tr><td colspan="7" style="text-align: center;">No customers yet</td></tr>';
                } else {
                    customersTable.innerHTML = customers.map(customer => `
                        <tr>
                            <td>${customer.name}</td>
                            <td>${customer.email || '-'}</td>
                            <td>${customer.phone || '-'}</td>
                            <td>${UIUtils.formatCurrency(customer.creditLimit)}</td>
                            <td>${UIUtils.formatCurrency(customer.currentBalance)}</td>
                            <td>${customer.isActive ? '<span style="color: var(--success-color);">✓ Active</span>' : '<span style="color: var(--danger-color);">✗ Inactive</span>'}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn btn-sm btn-primary" onclick="editCustomer('${customer.id}')">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteCustomer('${customer.id}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            }
        }

        customerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const orgId = ApiService.getSelectedOrg();
            if (!orgId) {
                UIUtils.showAlert('Please select an organisation', 'error');
                return;
            }

            const formData = new FormData(customerForm);
            const customerData = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                address: formData.get('address'),
                city: formData.get('city'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                creditLimit: parseFloat(formData.get('creditLimit'))
            };

            UIUtils.showLoading();
            const response = await ApiService.createCustomer(orgId, customerData);
            UIUtils.hideLoading();

            if (response.ok) {
                UIUtils.showAlert('Customer created successfully!', 'success');
                customerForm.reset();
                customerFormContainer.style.display = 'none';
                loadCustomers();
            } else {
                UIUtils.showAlert('Error creating customer', 'error');
            }
        });

        window.editCustomer = (customerId) => {
            UIUtils.showAlert('Edit functionality coming soon', 'info');
        };

        window.deleteCustomer = async (customerId) => {
            if (confirm('Delete this customer?')) {
                const orgId = ApiService.getSelectedOrg();
                const response = await ApiService.deleteCustomer(orgId, customerId);
                if (response.ok) {
                    UIUtils.showAlert('Customer deleted', 'success');
                    loadCustomers();
                }
            }
        };

        document.getElementById('organisationSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                ApiService.setSelectedOrg(e.target.value);
                loadCustomers();
            }
        });

        await ApiService.populateOrganisationSelector();
        loadCustomers();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            ApiService.logout();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
