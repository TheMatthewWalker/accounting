<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AccuBooks</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">📊 AccuBooks</h1>
            </div>
            <ul class="navbar-nav">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="form-container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
        </form>
        <p class="form-text">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>

    <script type="module">
        import { ApiService, UIUtils } from '../js/api.js';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            UIUtils.showLoading();
            const response = await ApiService.login(email, password);
            UIUtils.hideLoading();

            if (response.ok) {
                UIUtils.showAlert('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                UIUtils.showAlert(response.data?.message || 'Login failed', 'error');
            }
        });
    </script>
</body>
</html>
