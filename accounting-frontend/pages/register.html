<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AccuBooks</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">📊 AccuBooks</h1>
            </div>
            <ul class="navbar-nav">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="form-container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
            </div>
        </form>
        <p class="form-text">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script type="module">
        import { ApiService, UIUtils } from '../js/api.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                UIUtils.showAlert('Passwords do not match', 'error');
                return;
            }

            UIUtils.showLoading();
            const response = await ApiService.register(email, password, firstName, lastName);
            UIUtils.hideLoading();

            if (response.ok) {
                UIUtils.showAlert('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                UIUtils.showAlert(response.data?.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>
</html>
