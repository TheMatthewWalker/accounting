<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - AccuBooks</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div style="margin-bottom: 30px;">
                <h3 style="color: var(--primary-color); margin-bottom: 10px;">AccuBooks</h3>
                <select id="organisationSelect" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);">
                    <option value="">Select Organisation</option>
                </select>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="gl-accounts.html">📖 GL Accounts</a></li>
                <li><a href="daybook.html">📝 Daybook</a></li>
                <li><a href="reports.html">📈 Reports</a></li>
                <li><a href="customers.html">👥 Customers</a></li>
                <li><a href="suppliers.html" class="active">🏢 Suppliers</a></li>
                <li><a href="organisations.html">🏭 Organisations</a></li>
                <li><hr style="margin: 15px 0;"></li>
                <li><a href="#logout" id="logoutBtn">🚪 Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <h1>Suppliers</h1>
                <p>Manage your supplier accounts</p>
            </div>

            <div style="margin-bottom: 20px;">
                <button id="newSupplierBtn" class="btn btn-primary">+ New Supplier</button>
            </div>

            <div id="supplierFormContainer" style="display: none; margin-bottom: 30px; background: var(--light-bg); padding: 20px; border-radius: 8px;">
                <h3>New Supplier</h3>
                <form id="supplierForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Supplier Name</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="phone">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" name="address">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" name="city">
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" name="postalCode">
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" name="country">
                        </div>
                        <div class="form-group">
                            <label>Credit Limit</label>
                            <input type="number" name="creditLimit" step="0.01" value="0">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                        <button type="submit" class="btn btn-success">Create Supplier</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Credit Limit</th>
                            <th>Balance</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="suppliersTable">
                        <tr>
                            <td colspan="7" style="text-align: center; color: var(--secondary-color);">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { ApiService, UIUtils } from '../js/api.js';

        if (!ApiService.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const newSupplierBtn = document.getElementById('newSupplierBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const supplierFormContainer = document.getElementById('supplierFormContainer');
        const supplierForm = document.getElementById('supplierForm');
        const suppliersTable = document.getElementById('suppliersTable');

        newSupplierBtn.addEventListener('click', () => {
            supplierFormContainer.style.display = 'block';
        });

        cancelBtn.addEventListener('click', () => {
            supplierFormContainer.style.display = 'none';
            supplierForm.reset();
        });

        async function loadSuppliers() {
            const orgId = ApiService.getSelectedOrg();
            if (!orgId) return;

            const response = await ApiService.getSuppliers(orgId);
            if (response.ok) {
                const suppliers = response.data;
                if (suppliers.length === 0) {
                    suppliersTable.innerHTML = '<tr><td colspan="7" style="text-align: center;">No suppliers yet</td></tr>';
                } else {
                    suppliersTable.innerHTML = suppliers.map(supplier => `
                        <tr>
                            <td>${supplier.name}</td>
                            <td>${supplier.email || '-'}</td>
                            <td>${supplier.phone || '-'}</td>
                            <td>${UIUtils.formatCurrency(supplier.creditLimit)}</td>
                            <td>${UIUtils.formatCurrency(supplier.currentBalance)}</td>
                            <td>${supplier.isActive ? '<span style="color: var(--success-color);">✓ Active</span>' : '<span style="color: var(--danger-color);">✗ Inactive</span>'}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn btn-sm btn-primary" onclick="editSupplier('${supplier.id}')">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteSupplier('${supplier.id}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            }
        }

        supplierForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const orgId = ApiService.getSelectedOrg();
            if (!orgId) {
                UIUtils.showAlert('Please select an organisation', 'error');
                return;
            }

            const formData = new FormData(supplierForm);
            const supplierData = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                address: formData.get('address'),
                city: formData.get('city'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                creditLimit: parseFloat(formData.get('creditLimit'))
            };

            UIUtils.showLoading();
            const response = await ApiService.createSupplier(orgId, supplierData);
            UIUtils.hideLoading();

            if (response.ok) {
                UIUtils.showAlert('Supplier created successfully!', 'success');
                supplierForm.reset();
                supplierFormContainer.style.display = 'none';
                loadSuppliers();
            } else {
                UIUtils.showAlert('Error creating supplier', 'error');
            }
        });

        window.editSupplier = (supplierId) => {
            UIUtils.showAlert('Edit functionality coming soon', 'info');
        };

        window.deleteSupplier = async (supplierId) => {
            if (confirm('Delete this supplier?')) {
                const orgId = ApiService.getSelectedOrg();
                const response = await ApiService.deleteSupplier(orgId, supplierId);
                if (response.ok) {
                    UIUtils.showAlert('Supplier deleted', 'success');
                    loadSuppliers();
                }
            }
        };

        document.getElementById('organisationSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                ApiService.setSelectedOrg(e.target.value);
                loadSuppliers();
            }
        });

        const savedOrg = ApiService.getSelectedOrg();
        if (savedOrg) {
            document.getElementById('organisationSelect').value = savedOrg;
        }
        loadSuppliers();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            ApiService.logout();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
